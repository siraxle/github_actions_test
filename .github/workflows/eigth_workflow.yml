name: Eight Workflow
on: 
    workflow_dispatch:
        inputs:
            titleCustom:
                description: Type the Title
                type: string
                required: true
                default: "Hello World"
            selectCustom:
                description: Select Value
                type: choice
                required: true
                options:
                    - value 1
                    - value 2
                    - value 3
                    - value 4
                default: "Value 2"
            checkCustom:
                description: Checkbox
                type: boolean
                required: false
jobs:
    run_first_command:
        runs-on: ubuntu-latest
        steps:
            - name: Event Vars
              run: |
                echo "Title: ${{ inputs.titleCustom }}"
                echo "Title: ${{ inputs.selectCustom }}"
                echo "Title: ${{ inputs.checkCustom }}"